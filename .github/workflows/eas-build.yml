name: EAS Build & Submit

# Builds (and optionally submits) the app for a chosen environment via EAS.
#
# Triggers:
#   - Manual dispatch: pick the environment + whether to submit to the stores.
#   - Push to branches: develop -> testing, staging -> staging, main -> production.
#
# Requires the repo secret EXPO_TOKEN (Expo access token, create at
# https://expo.dev/accounts/[account]/settings/access-tokens).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build profile to run
        type: choice
        default: staging
        options: [development, testing, staging, production]
      platform:
        description: Target platform
        type: choice
        default: all
        options: [all, ios, android]
      submit:
        description: Submit to the stores after building
        type: boolean
        default: false
  push:
    branches: [develop, staging, main]

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ github.event.inputs.environment || 'auto' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boilerplate-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            PROFILE="${{ github.event.inputs.environment }}"
          else
            case "${GITHUB_REF_NAME}" in
              develop) PROFILE="testing" ;;
              staging) PROFILE="staging" ;;
              main)    PROFILE="production" ;;
              *)       PROFILE="testing" ;;
            esac
          fi
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
          echo "Resolved build profile: ${PROFILE}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: boilerplate-app/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          eas build \
            --non-interactive \
            --no-wait \
            --platform "${{ github.event.inputs.platform || 'all' }}" \
            --profile "${{ steps.env.outputs.profile }}"

      - name: Submit
        if: ${{ github.event.inputs.submit == 'true' }}
        run: |
          eas submit \
            --non-interactive \
            --platform "${{ github.event.inputs.platform || 'all' }}" \
            --profile "${{ steps.env.outputs.profile }}" \
            --latest
